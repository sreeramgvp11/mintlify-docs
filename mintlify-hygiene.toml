[project]
docs_dir = "."
nav_file = "docs.json"
include = ["**/*.mdx"]
exclude = [
  "archive/**",
  "snippets/**",
  # Intentionally hidden from nav (private, reachable only by direct URL) per PR #141;
  # excluded so the nav_registration rule does not flag it.
  "essentials/v2/graph-collections-byog.mdx",
]
mdx_parse_mode = "strict"

[rules.unescaped_lt]
enabled = true
level = "error"

[rules.frontmatter_yaml]
enabled = true
level = "error"

[rules.filename_chars]
enabled = true
level = "error"

[rules.nav_registration]
enabled = true
level = "error"

[rules.prose_em_dash]
enabled = true
level = "warn"
