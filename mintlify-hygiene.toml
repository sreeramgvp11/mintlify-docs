[project]
docs_dir = "."
nav_file = "docs.json"
include = ["**/*.mdx"]
exclude = [
  "archive/**",
  "snippets/**",
]
mdx_parse_mode = "strict"

[rules.unescaped_lt]
enabled = true
level = "error"

[rules.frontmatter_yaml]
enabled = true
level = "error"

[rules.filename_chars]
enabled = true
level = "error"

[rules.nav_registration]
enabled = true
level = "error"

[rules.prose_em_dash]
enabled = true
level = "warn"
