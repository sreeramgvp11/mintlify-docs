name: Mintlify Hygiene

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest mintlify-hygiene binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download \
            --repo usecortex/mintlify-hygiene \
            --pattern "*-x86_64-unknown-linux-gnu.tar.gz" \
            --pattern "SHA256SUMS" \
            --dir /tmp/hygiene
          ARCHIVE=$(ls /tmp/hygiene/mintlify-hygiene-*-x86_64-unknown-linux-gnu.tar.gz)
          cd /tmp/hygiene && grep "$(basename "$ARCHIVE")" SHA256SUMS | sha256sum -c --quiet
          tar xz -f "$ARCHIVE" -C /tmp/hygiene
          install -m 755 /tmp/hygiene/mintlify-hygiene-*/mintlify-hygiene "$GITHUB_WORKSPACE/mintlify-hygiene"

      - name: Run hygiene check
        id: check
        run: |
          set +e
          "$GITHUB_WORKSPACE/mintlify-hygiene" check --json \
            > hygiene-findings.json 2>hygiene-stderr.txt
          EXIT_CODE=$?
          set -e
          jq empty hygiene-findings.json 2>/dev/null || echo '[]' > hygiene-findings.json
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let findings = [];
            try {
              findings = JSON.parse(fs.readFileSync('hygiene-findings.json', 'utf8'));
            } catch (_) {}

            const exitCode = '${{ steps.check.outputs.exit_code }}';
            const passed = exitCode === '0';

            const errors   = findings.filter(f => f.severity === 'error');
            const warnings = findings.filter(f => f.severity === 'warn');

            const fmt = f =>
              `- \`${f.path}:${f.line}:${f.column}\` **${f.rule_id}** — ${f.message}`;

            let body;
            if (passed && findings.length === 0) {
              body = '### ✅ Mintlify Hygiene\n\nNo issues found.';
            } else if (exitCode === '') {
              body = '### ⚠️ Mintlify Hygiene\n\n_Binary download or execution failed — see workflow logs._';
            } else {
              const parts = ['### ❌ Mintlify Hygiene'];
              if (errors.length > 0) {
                parts.push(`\n**${errors.length} error${errors.length !== 1 ? 's' : ''}**\n`);
                parts.push(errors.map(fmt).join('\n'));
              }
              if (warnings.length > 0) {
                parts.push(`\n**${warnings.length} warning${warnings.length !== 1 ? 's' : ''}**\n`);
                parts.push(warnings.map(fmt).join('\n'));
              }
              body = parts.join('\n');
            }

            const MARKER = '<!-- mintlify-hygiene-check -->';
            const fullBody = `${MARKER}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.startsWith(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Fail on errors
        if: steps.check.outputs.exit_code != '0'
        run: |
          echo "Hygiene check found errors — see PR comment for details."
          exit 1
