name: "Bug Report"
description: "Report an error or issue in the documentation"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear description of the issue"
    validations:
      required: true

  - type: input
    id: page-url
    attributes:
      label: Page URL
      description: "URL of the affected documentation page"
      placeholder: "https://docs.hydradb.com/..."
    validations:
      required: true

  - type: textarea
    id: expected-content
    attributes:
      label: Expected Content
      description: "What the documentation should say"
    validations:
      required: true

  - type: textarea
    id: actual-content
    attributes:
      label: Actual Content
      description: "What the documentation currently says"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
    validations:
      required: false
